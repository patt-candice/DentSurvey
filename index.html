function commonInterviewFields(age){
  const base = ['round_id','interview_date','interviewer','weight','height','weight_height_source','religion'];
  const oralCare = ['brush_morning','brush_lunch','brush_bedtime','eat_after_bedtime_brush','brushing_duration','use_toothpaste','toothpaste_brand_code','toothpaste_brand_other'];

  if(age==='15') return base.concat(oralCare,['toothbrush_bristle_type','additional_cleaning_methods','sweet_drink_frequency','snack_frequency','smoking_status','smoking_years','smoking_months','cigarettes_per_day','quit_smoking_years','quit_smoking_months','other_tobacco_use','alcohol_status','oral_health_satisfaction','oral_health_problem_12m','oral_health_problem_types','health_welfare_rights','knowledge_need_sources','knowledge_need_topics','record_status']);
  const adult = base.concat(['marital_status','occupation','income_group','education_level','disease_diabetes','disease_hypertension','disease_heart','disease_depression','disease_kidney','disease_arthritis','disease_stroke','disease_asthma','disease_cancer','disease_cancer_site','disease_other'],oralCare,['toothbrush_bristle_type','toothbrush_change_frequency','additional_cleaning_methods','denture_cleaning_method','remove_denture_before_sleep','sweet_drink_frequency','sweet_level_order','add_sugar_frequency','smoking_status','smoking_years','smoking_months','cigarettes_per_day','quit_smoking_years','quit_smoking_months','other_tobacco_use','betel_chewing_status','alcohol_status','oral_health_satisfaction','oral_health_problem_12m','oral_health_problem_types','health_welfare_rights','oral_health_knowledge_sources_12m','dental_visit_12m','no_visit_reasons','dental_visit_times','visit_reasons','visit_places','used_health_right_last_visit','not_use_right_reasons','extra_payment_last_visit','extra_payment_amount']);
  if(age==='60_85') return adult.concat(['capacity_status','oral_cleaning_no_teeth_method','chewing_hard_food_problem','need_water_to_swallow','dry_tongue_palate','dry_mouth_feeling','coughing_choking_when_eating','record_status']);
  return adult.concat(['record_status']);
}
function examFields(age){
  const base=['round_id','exam_date','examiner','duplication','age','sex','religion','education','location_type'];
  if(age==='12') return base.concat(['dental_fluorosis'], GINGIVAL_TEETH.map(t=>'gingival_'+t), ['other_conditions','record_status']);
  if(age==='15') return base.concat(GINGIVAL_TEETH.map(t=>'gingival_'+t), ['other_conditions','record_status']);
  const adult = base.concat(['occlusal_tooth_wear','incisal_tooth_wear','cervical_tooth_wear'],GINGIVAL_TEETH.map(t=>'gingival_'+t),POCKET_SITES.map(t=>'pocket_'+t),['prosthetic_status_upper','prosthetic_status_lower','prosthetic_need_upper','prosthetic_need_lower','posterior_occlusal_pair_right','posterior_occlusal_pair_left','other_conditions','record_status']);
  if(age==='60_85') return base.concat(['capacity_status','oral_dryness_sign','cervical_tooth_wear'],GINGIVAL_TEETH.map(t=>'gingival_'+t),POCKET_SITES.map(t=>'pocket_'+t),['prosthetic_status_upper','prosthetic_status_lower','prosthetic_need_upper','prosthetic_need_lower','posterior_occlusal_pair_right','posterior_occlusal_pair_left','other_conditions','record_status']);
  return adult;
}

function setPage(page){state.page=page; render(); if(page==='dashboard') loadDashboard(); if(page==='records') loadRecords(); if(page==='admin') loadAdminStatus(); if(page==='users') loadUsers();}
function html(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function today(){return new Date().toISOString().slice(0,10)}
function toast(icon,title){Swal.fire({toast:true,position:'top-end',icon,title,showConfirmButton:false,timer:2200,timerProgressBar:true});}
function showLoading(title='กำลังประมวลผล'){Swal.fire({title,allowOutsideClick:false,didOpen:()=>Swal.showLoading()});}
async function api(action, data={}){
  if(GAS_API_URL.includes('PUT_YOUR')) throw new Error('กรุณาใส่ GAS_API_URL ใน index.html ก่อน');
  const payload = Object.assign({action, token:state.token}, data);
  const res = await fetch(GAS_API_URL, {method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify(payload)});
  const txt = await res.text();
  let json; try{json=JSON.parse(txt)}catch(e){console.error(txt); throw new Error('API ไม่ได้ส่ง JSON กลับมา กรุณาตรวจสอบ Deploy URL');}
  if(!json.success){ if(json.code==='UNAUTHORIZED'){logout(false);} throw new Error(json.message||json.code||'เกิดข้อผิดพลาด'); }
  return json;
}

function authTab(tab){
  document.getElementById('loginTab').className='tab flex-1 '+(tab==='login'?'tab-active':''); document.getElementById('regTab').className='tab flex-1 '+(tab==='register'?'tab-active':'');
  document.getElementById('authBox').innerHTML = tab==='login' ? `<form onsubmit="login(event)" class="space-y-3"><div><label class="label">Email</label><input class="input" name="email" value="admin@example.com"></div><div><label class="label">Password</label><input class="input" name="password" type="password" value="admin1234"></div><button class="btn btn-primary w-full">เข้าสู่ระบบ</button></form>` : `<form onsubmit="register(event)" class="grid gap-3"><input class="input" name="full_name" placeholder="ชื่อ-นามสกุล" required><input class="input" name="email" type="email" placeholder="อีเมล" required><input class="input" name="phone" placeholder="โทรศัพท์"><input class="input" name="password" type="password" placeholder="รหัสผ่าน" required><select class="input" name="role"><option>RECORDER</option><option>VIEWER</option><option>SCHOOL</option><option>HOSPITAL</option></select><input class="input" name="province" placeholder="จังหวัด"><input class="input" name="district" placeholder="อำเภอ"><input class="input" name="subdistrict" placeholder="ตำบล"><input class="input" name="organization" placeholder="หน่วยงาน/โรงเรียน/หน่วยบริการ"><button class="btn btn-primary w-full">สมัครเข้าใช้งาน</button></form>`;
}
async function login(e){e.preventDefault(); const d=Object.fromEntries(new FormData(e.target)); try{showLoading('กำลังเข้าสู่ระบบ'); const r=await api('login',d); state.token=r.token; state.user=r.user; localStorage.setItem('dental_token',r.token); localStorage.setItem('dental_user',JSON.stringify(r.user)); Swal.close(); render(); loadDashboard();}catch(err){Swal.fire('Login ไม่สำเร็จ',err.message,'error')}}
async function register(e){e.preventDefault(); const d=Object.fromEntries(new FormData(e.target)); try{showLoading('กำลังสมัคร'); const r=await api('register',d); Swal.fire('สำเร็จ',r.message,'success'); authTab('login');}catch(err){Swal.fire('สมัครไม่สำเร็จ',err.message,'error')}}
function logout(show=true){state.token='';state.user=null;localStorage.removeItem('dental_token');localStorage.removeItem('dental_user'); if(show) toast('success','ออกจากระบบแล้ว'); renderAuth();}

function pageDashboard(){return `<section class="grid lg:grid-cols-4 gap-4"><div class="card p-5"><p class="text-slate-500">บุคคลทั้งหมด</p><h2 id="kpiStudents" class="text-3xl font-bold text-cyan-800">-</h2></div><div class="card p-5"><p class="text-slate-500">แบบสัมภาษณ์</p><h2 id="kpiInterview" class="text-3xl font-bold text-emerald-700">-</h2></div><div class="card p-5"><p class="text-slate-500">แบบตรวจช่องปาก</p><h2 id="kpiExam" class="text-3xl font-bold text-indigo-700">-</h2></div><div class="card p-5"><p class="text-slate-500">Verified</p><h2 id="kpiVerified" class="text-3xl font-bold text-orange-600">-</h2></div></section><section class="grid lg:grid-cols-2 gap-4 mt-4"><div class="card p-5"><h3 class="font-bold text-cyan-800 mb-3">จำนวนตามกลุ่มวัย</h3><canvas id="ageChart"></canvas></div><div class="card p-5"><h3 class="font-bold text-cyan-800 mb-3">จำนวนตามอำเภอ</h3><canvas id="districtChart"></canvas></div></section><section class="card p-5 mt-4"><h3 class="font-bold text-cyan-800 mb-3">จำนวนแบบประเมินรายประเภท</h3><div id="formCounts" class="grid md:grid-cols-4 gap-3"></div></section>`;}
async function loadDashboard(){try{const r=await api('getDashboard'); const d=r.dashboard; document.getElementById('kpiStudents').textContent=d.totalStudents; const iv=Object.keys(d.forms).filter(k=>k.includes('Interview')).reduce((s,k)=>s+d.forms[k],0); const ex=Object.keys(d.forms).filter(k=>k.includes('OralExam')).reduce((s,k)=>s+d.forms[k],0); document.getElementById('kpiInterview').textContent=iv; document.getElementById('kpiExam').textContent=ex; document.getElementById('kpiVerified').textContent=d.verified; drawChart('ageChart',Object.keys(d.byAge),Object.values(d.byAge),'bar'); drawChart('districtChart',Object.keys(d.byDistrict),Object.values(d.byDistrict),'bar'); document.getElementById('formCounts').innerHTML=Object.entries(d.forms).map(([k,v])=>`<div class="rounded-2xl bg-slate-50 p-4"><div class="text-sm text-slate-500">${k}</div><div class="text-2xl font-bold text-cyan-800">${v}</div></div>`).join('');}catch(e){console.error(e);toast('error',e.message)}}
function drawChart(id, labels, data, type){const el=document.getElementById(id); if(!el)return; new Chart(el,{type,data:{labels,datasets:[{label:'จำนวน',data}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{precision:0}}}}});}

function pageStudents(){return `<section class="card p-5"><div class="flex flex-col md:flex-row md:items-end gap-3 mb-4"><div class="flex-1"><label class="label">ค้นหา ชื่อ / Identification / โรงเรียน / พื้นที่</label><input id="studentQ" class="input" placeholder="พิมพ์คำค้น"></div><div><label class="label">กลุ่มวัย</label><select id="studentAge" class="input"><option value="">ทั้งหมด</option>${AGE_GROUPS.map(a=>`<option value="${a.id}">${a.label}</option>`).join('')}</select></div><button onclick="searchStudents()" class="btn btn-primary">ค้นหา</button><button onclick="openStudentForm()" class="btn btn-soft">+ เพิ่มบุคคล</button></div><div id="studentResults" class="table-wrap"></div></section>`;}
async function searchStudents(){try{showLoading('กำลังค้นหา'); const r=await api('searchStudents',{q:val('studentQ'),age_group:val('studentAge')}); Swal.close(); renderStudentTable(r.rows||[]);}catch(e){Swal.fire('ผิดพลาด',e.message,'error')}}
function renderStudentTable(rows){document.getElementById('studentResults').innerHTML = renderStudentTableHtml(rows)}
function val(id){return (document.getElementById(id)||{}).value||''}
function studentFields(){return ['identification_number','citizen_id','prefix','first_name','last_name','nickname','sex','birth_date','age_year','age_month','age_group','religion','education_level','province','district','subdistrict','village','address_detail','school_name','class_level','room','student_no','service_unit','location_type','phone','guardian_name','guardian_phone','note'];}
function formInput(name,value=''){ const opts=options[name]; if(opts) return `<select name="${name}" class="input"><option value="">--เลือก--</option>${opts.map(o=>`<option ${String(value)===String(o)?'selected':''} value="${html(o)}">${html(o)}</option>`).join('')}</select>`; const type=name.includes('date')?'date':(name.includes('age')||name.includes('weight')||name.includes('height')||name.includes('money')||name.includes('amount')?'number':'text'); return `<input class="input" name="${name}" type="${type}" value="${html(value)}">`; }
function openStudentForm(row={}){Swal.fire({title: row.student_id?'แก้ไขข้อมูลบุคคล':'เพิ่มบุคคลใหม่',width:'900px',html:`<form id="studentForm" class="grid md:grid-cols-3 gap-3 text-left">${studentFields().map(f=>`<div><label class="label">${fieldLabels[f]||f}</label>${formInput(f,row[f]||'')}</div>`).join('')}</form>`,showCancelButton:true,confirmButtonText:'บันทึก',cancelButtonText:'ยกเลิก',preConfirm:()=>Object.fromEntries(new FormData(document.getElementById('studentForm')))}).then(async res=>{if(res.isConfirmed){try{const data=Object.assign({},row,res.value); showLoading('กำลังบันทึก'); const r=await api('saveStudent',{data:JSON.stringify(data)}); Swal.close(); if(r.duplicates&&r.duplicates.length) await Swal.fire('บันทึกแล้ว แต่พบข้อมูลคล้ายกัน',`พบ ${r.duplicates.length} รายการ ระบบอนุญาตให้บันทึกตามที่ยืนยัน`, 'warning'); else toast('success','บันทึกสำเร็จ'); searchStudents();}catch(e){Swal.fire('บันทึกไม่สำเร็จ',e.message,'error')}}})}
async function selectStudent(row){state.selectedStudent=row; try{const r=await api('getStudentHistory',{student_id:row.student_id}); state.history=r.history||[]; if(state.history.length){await Swal.fire({icon:'warning',title:'พบประวัติการประเมินของบุคคลนี้แล้ว',html:`<div class="text-left text-sm">${state.history.slice(0,8).map(h=>`<div class="p-2 rounded-lg bg-amber-50 mb-1">${h.type} ${h.age_group} วันที่ ${h.date||'-'} สถานะ ${h.record_status||'-'} โดย ${h.created_by||'-'}</div>`).join('')}<p class="mt-2 text-slate-600">ยังสามารถบันทึกผลประเมินใหม่ได้ หากเป็นการประเมินซ้ำหรือคนละรอบการสำรวจ</p></div>`,confirmButtonText:'บันทึกใหม่ต่อ'});} setPage('assessment');}catch(e){Swal.fire('ผิดพลาด',e.message,'error')}};

function pageAssessment(){ const s=state.selectedStudent; return `<section class="card p-5"><h2 class="text-xl font-bold text-cyan-800 mb-3">เพิ่มข้อมูลประเมิน</h2>${!s?assessmentPersonPicker():assessmentForm(s)}</section>`;}
function assessmentPersonPicker(){return `<div class="rounded-2xl bg-amber-50 p-5 text-amber-800 mb-5"><b>ต้องเลือกบุคคลก่อนประเมินเสมอ</b><p>ค้นหาและเลือกบุคคลจากหน้านี้ได้เลย หรือเพิ่มบุคคลใหม่ก่อนบันทึกแบบตรวจ/แบบสัมภาษณ์</p></div><div class="grid md:grid-cols-6 gap-3 mb-4"><div class="md:col-span-4"><label class="label">ค้นหา ชื่อ / Identification / เลขบัตร / โรงเรียน / พื้นที่</label><input id="assessStudentQ" class="input" placeholder="พิมพ์คำค้น"></div><div><label class="label">กลุ่มวัย</label><select id="assessStudentAge" class="input"><option value="">ทั้งหมด</option>${AGE_GROUPS.map(a=>`<option value="${a.id}">${a.label}</option>`).join('')}</select></div><div class="flex items-end gap-2"><button onclick="searchAssessStudents()" class="btn btn-primary">ค้นหา</button><button onclick="openStudentForm()" class="btn btn-soft">+ เพิ่มบุคคล</button></div></div><div id="assessmentStudentResults" class="table-wrap"></div><script>setTimeout(()=>searchAssessStudents(),80)<\/script>`;}
async function searchAssessStudents(){try{showLoading('กำลังค้นหา'); const r=await api('searchStudents',{q:val('assessStudentQ'),age_group:val('assessStudentAge')}); Swal.close(); document.getElementById('assessmentStudentResults').innerHTML = renderStudentTableHtml(r.rows||[]);}catch(e){Swal.fire('ผิดพลาด',e.message,'error')}}
function renderStudentTableHtml(rows){return `<table class="w-full text-left"><thead><tr>${['รหัส','ชื่อ','กลุ่มวัย','โรงเรียน/หน่วยบริการ','พื้นที่','จัดการ'].map(h=>`<th class="th">${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr><td class="td">${html(r.identification_number||r.citizen_id||r.student_id)}</td><td class="td font-semibold">${html(r.full_name)}</td><td class="td">${html(r.age_group||detectAgeGroup(r))}</td><td class="td">${html(r.school_name||r.service_unit)}</td><td class="td">${html([r.province,r.district,r.subdistrict].filter(Boolean).join(' / '))}</td><td class="td whitespace-nowrap"><button class="btn btn-soft" onclick='selectStudent(${JSON.stringify(r).replace(/'/g,"&#39;")})'>เลือกประเมิน</button><button class="btn btn-gray" onclick='openStudentForm(${JSON.stringify(r).replace(/'/g,"&#39;")})'>แก้ไข</button></td></tr>`).join('')}</tbody></table>`}
function detectAgeGroup(s){const y=Number(s.age_year||calcAgeYear(s.birth_date)||0); if(y===12)return '12'; if(y===15)return '15'; if(y>=35&&y<=44)return '35_44'; if(y>=60&&y<=85)return '60_85'; return s.age_group||'';}
function calcAgeYear(d){if(!d)return ''; const b=new Date(d); if(isNaN(b))return ''; const n=new Date(); let y=n.getFullYear()-b.getFullYear(); const m=n.getMonth()-b.getMonth(); if(m<0||(m===0&&n.getDate()<b.getDate()))y--; return y;}
function assessmentForm(s){return `<div class="rounded-2xl bg-cyan-50 p-4 mb-4"><div class="font-bold text-cyan-900">${html(s.full_name)} (${html(s.age_group)})</div><div class="text-sm text-cyan-800">${html(s.identification_number)} | ${html([s.school_name||s.service_unit,s.district,s.subdistrict].filter(Boolean).join(' / '))}</div><button class="btn btn-gray mt-2" onclick="state.selectedStudent=null;render()">เปลี่ยนบุคคล</button></div><div class="flex flex-wrap gap-2 mb-4"><button class="tab" onclick="switchAssessType('INTERVIEW')" id="tabINTERVIEW">แบบสัมภาษณ์</button><button class="tab tab-active" onclick="switchAssessType('ORAL_EXAM')" id="tabORAL_EXAM">แบบตรวจช่องปาก</button></div><input type="hidden" id="assessType" value="ORAL_EXAM"><div id="assessmentBox"></div><script>setTimeout(()=>renderAssessmentInner('ORAL_EXAM'),10)<\/script>`;}
function switchAssessType(t){document.getElementById('assessType').value=t; document.getElementById('tabINTERVIEW').className='tab '+(t==='INTERVIEW'?'tab-active':''); document.getElementById('tabORAL_EXAM').className='tab '+(t==='ORAL_EXAM'?'tab-active':''); renderAssessmentInner(t)}
function draftKey(type,age,studentId){return `dental_draft_${studentId}_${type}_${age}`}
function renderAssessmentInner(type){
  const s=state.selectedStudent;
  let age=detectAgeGroup(s);
  if(!age){
    document.getElementById('assessmentBox').innerHTML = `<div class="rounded-2xl bg-amber-50 p-5"><b>ระบบยังเลือกแบบประเมินอัตโนมัติไม่ได้</b><p class="mt-1">กรุณาเลือกกลุ่มวัยให้ตรงกับแบบสำรวจ</p><select id="manualAgeGroup" class="input max-w-xs mt-3">${AGE_GROUPS.map(a=>`<option value="${a.id}">${a.label}</option>`).join('')}</select><button class="btn btn-primary mt-3" onclick="state.selectedStudent.age_group=val('manualAgeGroup');renderAssessmentInner('${type}')">เปิดแบบประเมิน</button></div>`;
    return;
  }
  s.age_group=age;
  const key=draftKey(type,age,s.student_id);
  const draft=JSON.parse(localStorage.getItem(key)||'null');
  let data=Object.assign({round_id:'ROUND-2569-01',record_status:'SUBMITTED',interview_date:today(),exam_date:today(),interviewer:state.user.full_name,examiner:state.user.full_name,age:s.age_year,sex:s.sex,religion:s.religion,education:s.education_level,location_type:s.location_type}, draft||{});
  if(draft) setTimeout(()=>Swal.fire({icon:'question',title:'พบแบบร่างที่ยังไม่ได้ส่ง',text:'ต้องการกู้คืนหรือไม่',showCancelButton:true,confirmButtonText:'กู้คืน',cancelButtonText:'ลบทิ้ง'}).then(x=>{if(!x.isConfirmed){localStorage.removeItem(key); renderAssessmentInner(type)}}),80);
  if(type==='ORAL_EXAM'){
    document.getElementById('assessmentBox').innerHTML = `<form id="assessmentForm" oninput="saveDraft('${type}','${age}')">${renderOralExamForm(age,data)}<div class="flex flex-wrap gap-2 mt-5 no-print"><button type="button" class="btn btn-primary" onclick="saveAssessment('${type}','${age}')">บันทึกแบบตรวจช่องปาก</button><button type="button" class="btn btn-gray" onclick="clearDraft('${type}','${age}')">ลบแบบร่าง</button><button type="button" class="btn btn-soft" onclick="window.print()">พิมพ์หน้านี้</button></div></form>`;
    return;
  }
  const fields=commonInterviewFields(age);
  document.getElementById('assessmentBox').innerHTML = `<form id="assessmentForm" oninput="saveDraft('${type}','${age}')"><div class="grid md:grid-cols-3 gap-3">${fields.map(f=>`<div class="${['additional_cleaning_methods','dental_treatment_places','oral_health_info_sources','oral_health_problem_types','health_welfare_rights','knowledge_need_sources','knowledge_need_topics','oral_health_knowledge_sources_12m','no_visit_reasons','visit_reasons','visit_places','not_use_right_reasons','other_conditions'].includes(f)?'md:col-span-3':''}"><label class="label">${fieldLabels[f]||f}</label>${longField(f)?`<textarea class="input" name="${f}" rows="2">${html(data[f]||'')}</textarea>`:formInput(f,data[f]||'')}</div>`).join('')}</div><div class="flex flex-wrap gap-2 mt-5 no-print"><button type="button" class="btn btn-primary" onclick="saveAssessment('${type}','${age}')">บันทึกข้อมูล</button><button type="button" class="btn btn-gray" onclick="clearDraft('${type}','${age}')">ลบแบบร่าง</button><button type="button" class="btn btn-soft" onclick="window.print()">พิมพ์หน้านี้</button></div></form>`;
}
function longField(f){return ['additional_cleaning_methods','dental_treatment_places','oral_health_info_sources','oral_health_problem_types','health_welfare_rights','knowledge_need_sources','knowledge_need_topics','oral_health_knowledge_sources_12m','no_visit_reasons','visit_reasons','visit_places','not_use_right_reasons','other_conditions'].includes(f)}
function renderOralExamForm(age,data={}){
  const general=['round_id','exam_date','examiner','duplication','age','sex','religion','education','location_type'];
  const elderlyPre = age==='60_85' ? ['capacity_status','oral_dryness_sign'] : [];
  return `<div class="rounded-2xl border bg-white p-4 mb-4"><div class="grid md:grid-cols-3 gap-3">${general.concat(elderlyPre).map(f=>`<div><label class="label">${fieldLabels[f]||f}</label>${formInput(f,data[f]||'')}</div>`).join('')}</div></div>${toothChart(age,data)}${renderClinicalSection(age,data)}`;
}
function toothOrder(age, arch){
  if(age==='12') return arch==='upper' ? ['55','54','53','52','51','61','62','63','64','65','18','17','16','15','14','13','12','11','21','22','23','24','25','26','27','28'] : ['85','84','83','82','81','71','72','73','74','75','48','47','46','45','44','43','42','41','31','32','33','34','35','36','37','38'];
  return arch==='upper' ? ['18','17','16','15','14','13','12','11','21','22','23','24','25','26','27','28'] : ['48','47','46','45','44','43','42','41','31','32','33','34','35','36','37','38'];
}
function toothChart(age,data={}){
  const adult=['35_44','60_85'].includes(age);
  const rows=adult?['Crown','Root','Treatment']:['Crown','Treatment'];
  const archTable=(arch)=>{const teeth=toothOrder(age,arch); return `<div class="overflow-x-auto"><table class="tooth-grid"><thead><tr><th></th>${teeth.map(t=>`<th class="${['13','21','43','31'].includes(t)?'split-left':''}">${t}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr><td class="row-label">${r}</td>${teeth.map((t,i)=>{const key='tooth_'+t+'_'+r.toLowerCase(); const shaded=(age==='12' && ((arch==='upper' && ['18','28'].includes(t)) || (arch==='lower' && ['48','38'].includes(t))))?'shade':''; return `<td class="${shaded} ${['13','21','43','31'].includes(t)?'split-left':''}"><input name="${key}" maxlength="2" value="${html(data[key]||'')}"></td>`}).join('')}</tr>`).join('')}</tbody></table></div>`};
  return `<div class="dental-form-card mb-4"><div class="p-4 border-b"><div class="dental-section-title">DENTITION STATUS AND TREATMENT NEED</div><p class="text-xs text-slate-500 mt-1">ลงรหัสในช่อง Crown / Root / Treatment ตามตำแหน่งฟัน ให้เหมือนแบบกระดาษ</p></div><div class="p-4 space-y-4">${archTable('upper')}${archTable('lower')}${toothDefinitions(adult)}</div></div>`;
}
function toothDefinitions(adult=false){return `<div class="grid md:grid-cols-2 gap-4 mt-3"><div><div class="font-bold text-sm mb-1">TOOTH STATUS</div><table class="code-table"><tr><td class="font-semibold">Primary</td><td class="font-semibold">Permanent</td><td class="font-semibold">ความหมาย</td></tr>${[['A','0','Sound'],['H','K','White opacity or brown discoloration'],['N','P','Showing of enamel breakdown or dentine shadows'],['B','1','Visible cavity extending into dentine'],['C','2','Filled, with caries'],['D','3','Filled no caries, stainless steel crown (SSC)'],['E','4','Missing, as a result of caries'],['9','5','Missing, any other reason'],['F','6','Fissure sealant'],['G','7','Bridge abutment, special crown or veneer'],['9','8','Unerupted tooth'],['T','T','Trauma (fracture)'],['9','9','Not recorded']].map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td></tr>`).join('')}</table></div><div><div class="font-bold text-sm mb-1">TREATMENT</div><table class="code-table">${[['0','None'],['P','Prevention (Fluoride application)'],['F','Fissure sealant'],['R','Preventive resin restoration'],['1','One surface filling'],['2','Two or more surface fillings'],['3','Crown for any reason'],['4','Pulp care and restoration'],['5','Extraction'],['6','Need for other care (Specify)'],['9','Not recorded']].map(r=>`<tr><td class="font-semibold">${r[0]}</td><td>${r[1]}</td></tr>`).join('')}</table>${adult?'<p class="text-xs text-slate-500 mt-2">วัย 35-44 และ 60-85 มีแถว Root เพิ่มตามแบบสำรวจ</p>':''}</div></div>`}
function renderClinicalSection(age,data={}){
  if(age==='12') return `<div class="dental-form-card mb-4"><div class="grid md:grid-cols-2"><div class="clinical-box"><div class="font-bold mb-2">DENTAL FLUOROSIS</div><div class="grid grid-cols-2 gap-2 items-start"><div class="text-xs leading-6">0 = Normal<br>1 = Questionable<br>2 = Very mild<br>3 = Mild<br>4 = Moderate<br>5 = Severe<br>9 = Not recorded</div><input class="clinical-input" name="dental_fluorosis" value="${html(data.dental_fluorosis||'')}"></div></div>${gingivalBox(data)}</div><div class="clinical-box"><label class="font-bold block mb-2">OTHER CONDITIONS</label><textarea class="input" name="other_conditions" rows="2">${html(data.other_conditions||'')}</textarea></div>${statusBox(data)}</div>`;
  if(age==='15') return `<div class="dental-form-card mb-4">${gingivalBox(data)}<div class="clinical-box"><label class="font-bold block mb-2">OTHER CONDITIONS</label><textarea class="input" name="other_conditions" rows="3">${html(data.other_conditions||'')}</textarea></div>${statusBox(data)}</div>`;
  if(age==='35_44') return `<div class="dental-form-card mb-4"><div class="clinical-box space-y-2">${wearInput('occlusal_tooth_wear',data)}${wearInput('incisal_tooth_wear',data)}${wearInput('cervical_tooth_wear',data)}</div><div class="grid md:grid-cols-2">${gingivalBox(data,true)}${pocketBox(data)}</div>${prostheticBox(data)}<div class="clinical-box"><label class="font-bold block mb-2">OTHER CONDITIONS</label><textarea class="input" name="other_conditions" rows="2">${html(data.other_conditions||'')}</textarea></div>${statusBox(data)}</div>`;
  return `<div class="dental-form-card mb-4"><div class="clinical-box">${wearInput('cervical_tooth_wear',data)}</div><div class="grid md:grid-cols-2">${gingivalBox(data,true)}${pocketBox(data)}</div>${prostheticBox(data)}<div class="clinical-box"><label class="font-bold block mb-2">OTHER CONDITIONS</label><textarea class="input" name="other_conditions" rows="2">${html(data.other_conditions||'')}</textarea></div>${statusBox(data)}</div>`;
}
function wearInput(name,data){return `<div class="flex flex-wrap gap-3 items-center"><span class="font-bold uppercase min-w-[190px]">${fieldLabels[name]||name}</span><input class="clinical-input" name="${name}" value="${html(data[name]||'')}" maxlength="2"><span class="text-sm text-slate-500">(Number of teeth affected)</span></div>`}
function gingivalBox(data,healthy=false){const labs=[['16','gingival_16'],['11','gingival_11'],['26','gingival_26'],['46','gingival_46'],['31','gingival_31'],['36','gingival_36']];return `<div class="clinical-box"><div class="font-bold mb-2">GINGIVAL BLEEDING SCORES (MODIFIED)</div><div class="grid md:grid-cols-2 gap-3"><div class="text-xs leading-6">0 = ${healthy?'Healthy':'Absence of condition'}<br>1 = Bleeding<br>2 = Calculus<br>5 = Calculus with bleeding<br>9 = Not recorded</div><div><table class="mini-grid"><tr>${labs.slice(0,3).map(x=>`<th>${x[0]}</th>`).join('')}</tr><tr>${labs.slice(0,3).map(x=>`<td><input class="w-10 text-center outline-none" name="${x[1]}" value="${html(data[x[1]]||'')}"></td>`).join('')}</tr><tr>${labs.slice(3).map(x=>`<td><input class="w-10 text-center outline-none" name="${x[1]}" value="${html(data[x[1]]||'')}"></td>`).join('')}</tr><tr>${labs.slice(3).map(x=>`<th>${x[0]}</th>`).join('')}</tr></table></div></div></div>`}
function pocketBox(data){const labs=[['17/16','pocket_17_16'],['11','pocket_11'],['26/27','pocket_26_27'],['47/46','pocket_47_46'],['31','pocket_31'],['36/37','pocket_36_37']];return `<div class="clinical-box"><div class="font-bold mb-2">POCKET SCORES</div><div class="grid md:grid-cols-2 gap-3"><div class="text-xs leading-6">0 = Absence of condition<br>1 = Pocket 4-5 mm.<br>2 = Pocket 6 mm. or more<br>9 = Not recorded</div><div><table class="mini-grid"><tr>${labs.slice(0,3).map(x=>`<th>${x[0]}</th>`).join('')}</tr><tr>${labs.slice(0,3).map(x=>`<td><input class="w-10 text-center outline-none" name="${x[1]}" value="${html(data[x[1]]||'')}"></td>`).join('')}</tr><tr>${labs.slice(3).map(x=>`<td><input class="w-10 text-center outline-none" name="${x[1]}" value="${html(data[x[1]]||'')}"></td>`).join('')}</tr><tr>${labs.slice(3).map(x=>`<th>${x[0]}</th>`).join('')}</tr></table></div></div></div>`}
function prostheticBox(data){return `<div class="grid md:grid-cols-3"><div class="clinical-box"><div class="font-bold mb-2">PROSTHETIC STATUS</div><div class="flex gap-3 mb-2"><label>Upper <input class="clinical-input" name="prosthetic_status_upper" value="${html(data.prosthetic_status_upper||'')}"></label><label>Lower <input class="clinical-input" name="prosthetic_status_lower" value="${html(data.prosthetic_status_lower||'')}"></label></div><div class="text-xs leading-5">0 = No prosthesis<br>1 = Bridge<br>2 = More than one bridge<br>3 = Partial denture<br>4 = Both bridge(s) and partial denture(s)<br>5 = Full removable denture<br>6 = Coping with Complete denture<br>9 = Not recorded</div></div><div class="clinical-box"><div class="font-bold mb-2">PROSTHETIC NEED</div><div class="flex gap-3 mb-2"><label>Upper <input class="clinical-input" name="prosthetic_need_upper" value="${html(data.prosthetic_need_upper||'')}"></label><label>Lower <input class="clinical-input" name="prosthetic_need_lower" value="${html(data.prosthetic_need_lower||'')}"></label></div><div class="text-xs leading-5">0 = No prosthesis needed<br>1 = Need for one-unit prosthesis<br>2 = Need for multi-unit prosthesis<br>3 = Need for full prosthesis<br>4 = Need to repair denture<br>9 = Not recorded</div></div><div class="clinical-box"><div class="font-bold mb-4">POSTERIOR OCCLUSAL PAIR</div><div class="flex gap-5"><label>Right<br><input class="clinical-input" name="posterior_occlusal_pair_right" value="${html(data.posterior_occlusal_pair_right||'')}"></label><label>Left<br><input class="clinical-input" name="posterior_occlusal_pair_left" value="${html(data.posterior_occlusal_pair_left||'')}"></label></div></div></div>`}
function statusBox(data){return `<div class="clinical-box"><label class="label">สถานะข้อมูล</label>${formInput('record_status',data.record_status||'SUBMITTED')}</div>`}
function saveDraft(type,age){ const s=state.selectedStudent; if(!s)return; const data=Object.fromEntries(new FormData(document.getElementById('assessmentForm'))); localStorage.setItem(draftKey(type,age,s.student_id), JSON.stringify(data)); }
function clearDraft(type,age){localStorage.removeItem(draftKey(type,age,state.selectedStudent.student_id)); toast('success','ลบแบบร่างแล้ว');}
async function saveAssessment(type,age){ if(!state.selectedStudent) return Swal.fire('ต้องเลือกบุคคลก่อน','','warning'); const data=Object.fromEntries(new FormData(document.getElementById('assessmentForm'))); data.student_id=state.selectedStudent.student_id; data.age_group=age; data.type=type; try{showLoading('กำลังบันทึก'); const r=await api('saveAssessment',{type,age_group:age,data:JSON.stringify(data)}); localStorage.removeItem(draftKey(type,age,state.selectedStudent.student_id)); if(type==='ORAL_EXAM'){const ans=await Swal.fire({icon:'success',title:'บันทึกแบบตรวจสำเร็จ',html:`Completeness ${r.row.completeness_score || 0}%<br>ต้องการทำแบบสัมภาษณ์ต่อเลยหรือไม่`,showCancelButton:true,confirmButtonText:'ทำแบบสัมภาษณ์ต่อ',cancelButtonText:'ยังไม่ทำ'}); if(ans.isConfirmed){switchAssessType('INTERVIEW'); return;}} else {await Swal.fire('บันทึกสำเร็จ',`Completeness ${r.row.completeness_score || 0}%`,'success');}}catch(e){Swal.fire('บันทึกไม่สำเร็จ',e.message,'error')}}

function pageRecords(){return `<section class="card p-5"><div class="grid md:grid-cols-6 gap-3 mb-4"><div><label class="label">ประเภท</label><select id="recType" class="input"><option value="INTERVIEW">แบบสัมภาษณ์</option><option value="ORAL_EXAM">แบบตรวจช่องปาก</option></select></div><div><label class="label">กลุ่มวัย</label><select id="recAge" class="input">${AGE_GROUPS.map(a=>`<option value="${a.id}">${a.label}</option>`).join('')}</select></div><div class="md:col-span-2"><label class="label">ค้นหา</label><input id="recQ" class="input" placeholder="ชื่อ/รหัส/โรงเรียน"></div><div><label class="label">สถานะ</label><select id="recStatus" class="input"><option value="">ทั้งหมด</option>${RECORD_STATUS.map(s=>`<option>${s}</option>`).join('')}</select></div><div class="flex items-end gap-2"><button onclick="loadRecords()" class="btn btn-primary">ค้นหา</button><button onclick="exportCsv()" class="btn btn-soft">CSV</button></div></div><div id="recordResults" class="table-wrap"></div></section>`;}
async function loadRecords(){try{showLoading('กำลังโหลดรายการ'); const r=await api('listRecords',{type:val('recType')||'INTERVIEW',age_group:val('recAge')||'12',q:val('recQ'),record_status:val('recStatus')}); Swal.close(); state.records=r.rows||[]; renderRecordTable();}catch(e){console.error(e);Swal.fire('ผิดพลาด',e.message,'error')}}
function renderRecordTable(){const type=val('recType')||'INTERVIEW'; const idf=type==='ORAL_EXAM'?'exam_id':'interview_id'; const df=type==='ORAL_EXAM'?'exam_date':'interview_date'; document.getElementById('recordResults').innerHTML=`<table class="w-full text-left"><thead><tr>${['ID','วันที่','บุคคล','พื้นที่','สถานะ','Completeness','จัดการ'].map(h=>`<th class="th">${h}</th>`).join('')}</tr></thead><tbody>${state.records.map(r=>`<tr><td class="td">${html(r[idf])}</td><td class="td">${html(r[df])}</td><td class="td">${html(r.full_name||r.student_id)}</td><td class="td">${html([r.province,r.district,r.subdistrict].filter(Boolean).join('/'))}</td><td class="td">${html(r.record_status)}</td><td class="td">${html(r.completeness_score)}%</td><td class="td whitespace-nowrap"><button class="btn btn-soft" onclick='openReport(${JSON.stringify({record_id:r[idf],type:type,age_group:val('recAge')||'12'}).replace(/'/g,"&#39;")})'>รายงาน</button>${state.user.role!=='VIEWER'?`<button class="btn btn-gray" onclick="verifyRecord('${r[idf]}')">ตรวจรับ</button><button class="btn btn-danger" onclick="deleteRecord('${r[idf]}')">ลบ</button>`:''}</td></tr>`).join('')}</tbody></table>`}
async function verifyRecord(id){ const status=await Swal.fire({title:'เปลี่ยนสถานะ',input:'select',inputOptions:{VERIFIED:'VERIFIED',RETURNED:'RETURNED',SUBMITTED:'SUBMITTED'},inputValue:'VERIFIED',showCancelButton:true}); if(!status.isConfirmed)return; try{showLoading('กำลังปรับสถานะ'); await api('verifyRecord',{record_id:id,type:val('recType'),age_group:val('recAge'),status:status.value}); Swal.close(); toast('success','ปรับสถานะแล้ว'); loadRecords();}catch(e){Swal.fire('ผิดพลาด',e.message,'error')}}
async function deleteRecord(id){ const ok=await Swal.fire({title:'ยืนยันลบข้อมูล?',text:'ระบบจะ soft delete ไม่ลบข้อมูลจริง',icon:'warning',showCancelButton:true}); if(!ok.isConfirmed)return; try{await api('deleteAssessment',{record_id:id,type:val('recType'),age_group:val('recAge')}); toast('success','ลบแล้ว'); loadRecords();}catch(e){Swal.fire('ผิดพลาด',e.message,'error')}}
function exportCsv(){ const rows=state.records; if(!rows.length)return toast('warning','ไม่มีข้อมูล'); const headers=Object.keys(rows[0]); const csv=[headers.join(',')].concat(rows.map(r=>headers.map(h=>'"'+String(r[h]??'').replace(/"/g,'""')+'"').join(','))).join('\n'); const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='dental_export.csv'; a.click(); }

function pageReport(){return `<section class="card p-5"><h2 class="text-xl font-bold text-cyan-800 mb-3">พิมพ์รายงานรายบุคคล</h2><p class="text-slate-500 mb-4">เลือกจากหน้ารายการข้อมูล หรือกรอกข้อมูลด้านล่าง</p><div class="grid md:grid-cols-4 gap-3 no-print"><select id="repType" class="input"><option value="INTERVIEW">แบบสัมภาษณ์</option><option value="ORAL_EXAM">แบบตรวจช่องปาก</option></select><select id="repAge" class="input">${AGE_GROUPS.map(a=>`<option value="${a.id}">${a.label}</option>`).join('')}</select><input id="repId" class="input" placeholder="record_id"><button onclick="openReport({type:val('repType'),age_group:val('repAge'),record_id:val('repId')})" class="btn btn-primary">แสดงรายงาน</button></div><div id="reportBox" class="mt-4"></div></section>`;}
async function openReport(p){setPage('report'); setTimeout(async()=>{try{showLoading('กำลังสร้างรายงาน'); const r=await api('getReport',p); Swal.close(); state.report=r.report; renderReport();}catch(e){Swal.fire('ผิดพลาด',e.message,'error')}},80)}
function renderReport(){ const rp=state.report; if(!rp)return; const rec=rp.record, stu=rp.student; document.getElementById('reportBox').innerHTML=`<div class="print-area bg-white rounded-2xl p-6 border"><div class="flex justify-between gap-3"><div><h1 class="text-2xl font-bold text-cyan-900">รายงานรายบุคคล: ${rp.type==='INTERVIEW'?'แบบสัมภาษณ์':'แบบตรวจสุขภาพช่องปาก'}</h1><p>กลุ่มวัย ${rp.age_group} | วันที่พิมพ์ ${rp.generated_at}</p></div><button class="btn btn-primary no-print" onclick="window.print()">พิมพ์</button></div><hr class="my-4"><h2 class="font-bold text-lg text-cyan-800">ข้อมูลบุคคล</h2><div class="grid md:grid-cols-3 gap-2 text-sm">${['student_id','identification_number','full_name','sex','birth_date','age_year','age_month','age_group','province','district','subdistrict','school_name','class_level','service_unit'].map(k=>`<div><b>${fieldLabels[k]||k}:</b> ${html(stu[k]||rec[k]||'')}</div>`).join('')}</div><h2 class="font-bold text-lg text-cyan-800 mt-5">ข้อมูลแบบประเมิน</h2><div class="grid md:grid-cols-2 gap-2 text-sm">${Object.entries(rec).filter(([k,v])=>v!==''&&v!=null).map(([k,v])=>`<div class="border-b py-1"><b>${fieldLabels[k]||k}:</b> ${html(v)}</div>`).join('')}</div></div>`;}

function pageUsers(){return `<section class="card p-5"><h2 class="text-xl font-bold text-cyan-800 mb-3">จัดการผู้ใช้</h2><button onclick="loadUsers()" class="btn btn-primary mb-3">โหลดข้อมูล</button><div id="usersBox" class="table-wrap"></div></section>`}
async function loadUsers(){try{const r=await api('listUsers'); document.getElementById('usersBox').innerHTML=`<table class="w-full text-left"><thead><tr>${['ชื่อ','email','role','พื้นที่','status','จัดการ'].map(h=>`<th class="th">${h}</th>`).join('')}</tr></thead><tbody>${r.rows.map(u=>`<tr><td class="td">${html(u.full_name)}</td><td class="td">${html(u.email)}</td><td class="td">${html(u.role)}</td><td class="td">${html([u.province,u.district,u.subdistrict].filter(Boolean).join('/'))}</td><td class="td">${html(u.status)}</td><td class="td"><button class="btn btn-soft" onclick="approveUser('${u.user_id}','APPROVED')">อนุมัติ</button><button class="btn btn-danger" onclick="approveUser('${u.user_id}','SUSPENDED')">ระงับ</button></td></tr>`).join('')}</tbody></table>`}catch(e){toast('error',e.message)}}
async function approveUser(id,status){try{await api('updateUserStatus',{user_id:id,status}); toast('success','บันทึกสถานะแล้ว'); loadUsers();}catch(e){Swal.fire('ผิดพลาด',e.message,'error')}}
function pageAdmin(){return `<section class="card p-5"><div class="flex flex-wrap gap-2 mb-4"><button onclick="runSetup()" class="btn btn-primary">Run setupAll</button><button onclick="repairHeaders()" class="btn btn-soft">Repair Headers</button><button onclick="seedData()" class="btn btn-soft">Seed Sample Data</button><button onclick="clearCache()" class="btn btn-gray">Clear Cache</button><button onclick="loadAdminStatus()" class="btn btn-gray">Refresh</button></div><div id="adminBox" class="table-wrap"></div></section>`}
async function loadAdminStatus(){try{const r=await api('getAdminStatus'); document.getElementById('adminBox').innerHTML=`<table class="w-full text-left"><thead><tr>${['Sheet','Exists','Records','Headers'].map(h=>`<th class="th">${h}</th>`).join('')}</tr></thead><tbody>${r.status.sheets.map(s=>`<tr><td class="td font-semibold">${s.sheet}</td><td class="td">${s.exists?'YES':'NO'}</td><td class="td">${s.records}</td><td class="td">${s.headers}</td></tr>`).join('')}</tbody></table>`}catch(e){toast('error',e.message)}}
async function runSetup(){try{showLoading('กำลัง setup'); await api('setupAll'); Swal.fire('สำเร็จ','setupAll completed','success'); loadAdminStatus();}catch(e){Swal.fire('ผิดพลาด',e.message,'error')}}
async function repairHeaders(){try{await api('repairHeaders'); toast('success','ซ่อม Header แล้ว'); loadAdminStatus();}catch(e){Swal.fire('ผิดพลาด',e.message,'error')}}
async function seedData(){try{await api('seedSampleData',{force:'1'}); toast('success','เพิ่มข้อมูลตัวอย่างแล้ว'); loadAdminStatus();}catch(e){Swal.fire('ผิดพลาด',e.message,'error')}}
async function clearCache(){try{await api('clearCache'); toast('success','Clear cache แล้ว');}catch(e){Swal.fire('ผิดพลาด',e.message,'error')}}

render(); if(state.token && state.user) setTimeout(()=>loadDashboard(),100);
</script>
</body>
</html>
